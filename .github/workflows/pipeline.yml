name: Data Lake Pipeline

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install libraries
      run: |
        pip install pandas pyarrow numpy pyyaml

    - name: Run pipeline
      run: |
        python pipeline.py
